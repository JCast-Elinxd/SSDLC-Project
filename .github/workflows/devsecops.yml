name: DevSecOps Pipeline – Fraud Detection

on:
  push:
    branches: ["main", "develop", "JulietaRama"]
  pull_request:
    branches: ["main"]

jobs:
  # ── 1. SAST — Static Application Security Testing ──────────────────────────
  sast:
    name: "SAST – Bandit Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r app/ -f json -o bandit-report.json --severity-level high --confidence-level medium || true
          python - <<'EOF'
          import json, sys
          with open("bandit-report.json") as f:
              report = json.load(f)
          highs = [i for i in report.get("results", []) if i["issue_severity"] == "HIGH"]
          if highs:
              print(f"❌ {len(highs)} HIGH severity issue(s) found:")
              for h in highs:
                  print(f"  - {h['issue_text']} [{h['filename']}:{h['line_number']}]")
              sys.exit(1)
          else:
              print("✅ SAST passed — no HIGH severity issues.")
          EOF

      - name: Upload SAST Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-sast-report
          path: bandit-report.json

  # ── 2. Dependency Scanning ──────────────────────────────────────────────────
  dependency-scan:
    name: "Dependency Scan – pip-audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit --requirement requirements.txt --format json --output pip-audit-report.json || true
          python - <<'EOF'
          import json, sys
          try:
              with open("pip-audit-report.json") as f:
                  report = json.load(f)
          except Exception:
              print("✅ No vulnerabilities found.")
              sys.exit(0)
          vulns = [v for dep in report.get("dependencies", []) for v in dep.get("vulns", [])]
          if vulns:
              print(f"❌ {len(vulns)} vulnerable dependency/ies found.")
              for v in vulns:
                  print(f"  - {v['id']}: {v['description'][:80]}")
              sys.exit(1)
          print("✅ Dependency scan passed.")
          EOF

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  # ── 3. Quality Gate ─────────────────────────────────────────────────────────
  quality-gate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan]
    steps:
      - name: All checks passed
        run: |
          echo "✅ Quality Gate PASSED"
          echo "  • SAST: no HIGH severity issues"
          echo "  • Dependencies: no vulnerable packages"
          echo "  → Safe to merge"